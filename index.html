/* === CSS Variables === */
:root {
  --bg-primary: #FFFFFF;
  --bg-secondary: #F5F5F5;
  --bg-card: #FFFFFF;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  --text-primary: #1A1A1A;
  --text-secondary: #666666;
  --text-weak: #999999;
  --accent: #3B5998;
  --accent-light: rgba(59,89,152,0.1);
  --border: #E8E8E8;
  --border-light: #F0F0F0;
  --danger: #FF4D4F;
  --success: #52C41A;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --safe-top: 40px;
  --safe-bottom: 40px;
  --nav-height: 60px;
  --status-height: 48px;
}

/* === Quality Colors === */
:root {
  --q-green: #52C41A;
  --q-blue: #1890FF;
  --q-purple: #722ED1;
  --q-orange: #FA8C16;
  --q-red: #FF4D4F;
}

/* === Reset === */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: var(--font-main);
  background: var(--bg-secondary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* === Game Container === */
#game-container {
  width: 100%;
  max-width: 480px;
  height: 100%;
  margin: 0 auto;
  position: relative;
  background: var(--bg-primary);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  transition: box-shadow 0.3s ease;
}

#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
  transition: opacity 0.15s ease;
}

/* === Utility Classes === */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}

.card-pressed {
  box-shadow: var(--shadow-md);
  transform: scale(0.97);
  transition: all 0.1s ease;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-primary {
  background: var(--accent);
  color: #FFFFFF;
}

.btn-primary:active {
  opacity: 0.85;
}

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.btn-secondary:active {
  background: var(--border-light);
}

.btn-danger {
  background: var(--danger);
  color: #FFFFFF;
}

.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
}

.btn-lg {
  padding: 14px 28px;
  font-size: 16px;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}

.badge-green { background: rgba(82,196,26,0.12); color: var(--q-green); }
.badge-blue  { background: rgba(24,144,255,0.12); color: var(--q-blue); }
.badge-purple { background: rgba(114,46,209,0.12); color: var(--q-purple); }
.badge-orange { background: rgba(250,140,22,0.12); color: var(--q-orange); }
.badge-red    { background: rgba(255,77,79,0.12); color: var(--q-red); }

.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: #FFFFFF;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  pointer-events: none;
  z-index: 9999;
  animation: toastIn 0.3s ease;
}

@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* === Loading Screen === */
#loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary);
  z-index: 100;
  transition: opacity 0.4s ease;
}

#loading.hide {
  opacity: 0;
  pointer-events: none;
}

#loading .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border-light);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loading .title {
  margin-top: 16px;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* === Orientation Lock === */
@media (orientation: landscape) {
  #orientation-warning {
    display: flex;
  }
}

#orientation-warning {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  z-index: 10000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 16px;
}

  <script>
/* === rng.js - 随机数工具 === */

const RNG = {

  /* 区间随机整数 [min, max] 含两端 */
  int(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  },

  /* 区间随机浮点数 [min, max) */
  float(min, max) {
    return Math.random() * (max - min) + min;
  },

  /* 加权随机：items = [{ value, weight }, ...]，返回被选中的 value */
  weighted(items) {
    const total = items.reduce((s, i) => s + i.weight, 0);
    let r = Math.random() * total;
    for (const item of items) {
      r -= item.weight;
      if (r <= 0) return item.value;
    }
    return items[items.length - 1].value;
  },

  /* Fisher-Yates 洗牌（原地） */
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  },

  /* 从数组中随机抽取 n 个不重复元素 */
  pick(arr, n = 1) {
    if (n >= arr.length) return this.shuffle([...arr]);
    const picked = [];
    const pool = [...arr];
    for (let i = 0; i < n; i++) {
      const idx = this.int(0, pool.length - 1);
      picked.push(pool.splice(idx, 1)[0]);
    }
    return picked;
  },

  /* 概率判定：percentage 为 0-100 */
  chance(percentage) {
    return Math.random() * 100 < percentage;
  },

  /* 正态分布近似（Box-Muller），返回均值附近的值 */
  gaussian(mean = 0, std = 1) {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return mean + std * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
};

  </script>

  <script>
/* === storage.js - 本地存档 === */

const Storage = {
  KEY: 'wanjie_wabao_save',

  /* 保存 */
  save(data) {
    try {
      const json = JSON.stringify(data);
      localStorage.setItem(this.KEY, json);
      return true;
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        console.warn('[Storage] 存档空间不足');
      }
      return false;
    }
  },

  /* 读取 */
  load() {
    try {
      const json = localStorage.getItem(this.KEY);
      if (!json) return null;
      return JSON.parse(json);
    } catch (e) {
      console.warn('[Storage] 存档损坏，已忽略');
      return null;
    }
  },

  /* 删除存档 */
  reset() {
    localStorage.removeItem(this.KEY);
  },

  /* 存档是否存在 */
  exists() {
    return localStorage.getItem(this.KEY) !== null;
  },

  /* 导出字符串（用于云存档/手动备份） */
  exportString() {
    return localStorage.getItem(this.KEY) || '';
  },

  /* 导入字符串 */
  importString(json) {
    try {
      JSON.parse(json);
      localStorage.setItem(this.KEY, json);
      return true;
    } catch (e) {
      return false;
    }
  }
};

  </script>

  <script>
/* === timer.js - 计时器工具 === */

class Countdown {
  /* duration: 总秒数；onTick(remaining, elapsed)；onEnd() */
  constructor(duration, onTick, onEnd) {
    this.duration = duration;
    this.remaining = duration;
    this.elapsed = 0;
    this.onTick = onTick || (() => {});
    this.onEnd = onEnd || (() => {});
    this._interval = null;
    this._paused = false;
  }

  start() {
    if (this._interval) return;
    this._interval = setInterval(() => {
      if (this._paused) return;
      this.elapsed += 1;
      this.remaining = Math.max(0, this.duration - this.elapsed);
      this.onTick(this.remaining, this.elapsed);
      if (this.remaining <= 0) {
        this.stop();
        this.onEnd();
      }
    }, 1000);
  }

  pause() {
    this._paused = true;
  }

  resume() {
    this._paused = false;
  }

  stop() {
    clearInterval(this._interval);
    this._interval = null;
  }

  /* 加速剩余时间：factor=2 即速度翻倍 */
  accelerate(factor) {
    /* 减剩余秒数，加速到0即触发结束 */
    const skip = Math.min(this.remaining, Math.floor(this.remaining * (1 - 1 / factor)));
    this.elapsed += skip;
    this.remaining -= skip;
    if (this.remaining <= 0) {
      this.remaining = 0;
      this.stop();
      this.onEnd();
    }
  }
}

/* 现实时间戳计时器（用于离线结算） */
class RealTimeTimer {
  constructor(startTimestamp) {
    this.start = startTimestamp || Date.now();
  }

  /* 距开始经过的秒数 */
  elapsed() {
    return Math.floor((Date.now() - this.start) / 1000);
  }

  /* 是否已达到 duration 秒 */
  isDone(duration) {
    return this.elapsed() >= duration;
  }

  /* 剩余秒数 */
  remaining(duration) {
    return Math.max(0, duration - this.elapsed());
  }
}

  </script>

  <script>
/* === state.js - 全局游戏状态 === */

const GameState = {
  /* 玩家 */
  player: {
    name: '掘金者',
    level: 1,
    gold: 500,
    diamond: 10,
    exp: 0,
  },

  /* 建筑等级 */
  buildings: {
    hall: 1,        /* 大厅 */
    expedition: 1,  /* 寻藏营 */
    museum: 1,      /* 博物馆 */
    auction: 1,     /* 拍卖行 */
    workshop: 1,    /* 工坊 */
  },

  /* 队员列表 [{ id, name, quality, aptitude, specialty, equipment }] */
  members: [],

  /* 寻藏派遣 { id, worldId, memberId, startTime, duration, status } */
  expeditions: [],

  /* 藏宝图背包 [{ id, quality, theme, worldId, obtainedAt }] */
  treasureMaps: [],

  /* 挖宝进度 { id, mapId, mode(auto/manual), startTime, duration, status } */
  digs: [],

  /* 藏品背包 [{ id, name, quality, number, world, description }] */
  collection: [],

  /* 博物馆展位 [slotIndex: itemId|null] */
  museumSlots: [null, null, null, null, null, null],

  /* 装备背包 */
  equipment: [],

  /* 材料背包 [{ id, name, count }] */
  materials: [],

  /* 拍卖行 - 当前拍卖会状态 */
  auction: {
    phase: 'idle',      /* idle / listing / active / settled */
    roundEnd: null,      /* 倒计时结束时间戳 */
    listings: [],        /* 正在上架的藏品ID列表 */
    activeLots: [],      /* 正在竞拍的拍品 */
  },

  /* 工坊配方解锁列表 */
  recipes: [],

  /* 统计 */
  stats: {
    totalDigs: 0,
    totalGold: 0,
    totalMaps: 0,
  },

  /* UI 状态 */
  ui: {
    currentPage: 'hall',
    toast: null,
  },

  /* --- 初始化 --- */
  init() {
    const saved = Storage.load();
    if (saved) {
      Object.assign(this.player, saved.player);
      Object.assign(this.buildings, saved.buildings);
      this.buildingsUpgrading = saved.buildingsUpgrading || {};
      this.members = saved.members || [];
      this.expeditions = saved.expeditions || [];
      this.treasureMaps = saved.treasureMaps || [];
      this.digs = saved.digs || [];
      this.collection = saved.collection || [];
      this.museumSlots = saved.museumSlots || this.museumSlots;
      /* 向后兼容：旧存档 museumSlots 存储 itemId 字符串 → 迁移为完整对象 */
      for (let i = 0; i < this.museumSlots.length; i++) {
        const s = this.museumSlots[i];
        if (s && typeof s === 'string') {
          const full = this.collection.find(c => c.id === s);
          this.museumSlots[i] = full || null;
        }
      }
      this.equipment = saved.equipment || [];
      this.materials = saved.materials || [];
      this.auction = Object.assign(this.auction, saved.auction || {});
      this.recipes = saved.recipes || [];
      this.stats = Object.assign(this.stats, saved.stats || {});
    }
  },

  /* --- 存档 --- */
  save() {
    Storage.save({
      player: { ...this.player },
      buildings: { ...this.buildings },
      buildingsUpgrading: this.buildingsUpgrading ? { ...this.buildingsUpgrading } : null,
      members: this.members,
      expeditions: this.expeditions,
      treasureMaps: this.treasureMaps,
      digs: this.digs,
      collection: this.collection,
      museumSlots: this.museumSlots,
      equipment: this.equipment,
      materials: this.materials,
      auction: { ...this.auction },
      recipes: this.recipes,
      stats: { ...this.stats },
    });
  },

  /* --- Toast --- */
  toast(msg, duration = 2000) {
    if (this._toastTimer) clearTimeout(this._toastTimer);
    this.ui.toast = msg;
    this._toastTimer = setTimeout(() => {
      this.ui.toast = null;
    }, duration);
  },

  /* --- 导航 --- */
  goTo(page) {
    this.ui.currentPage = page;
  }
};

  </script>

/* === expedition.js - 寻藏派遣系统 === */

const ExpeditionSystem = {
  init() { this.checkAll(); },

  dispatch(worldId, memberId, durationMinutes) {
    const id = 'exp_' + Date.now() + '_' + RNG.int(0, 9999);
    const now = Date.now();
    const exp = { id, worldId, memberId, startTime: now, duration: durationMinutes * 60000, endTime: now + durationMinutes * 60000, status: 'active' };
    GameState.expeditions.push(exp);
    const member = GameState.members.find(m => m.id === memberId);
    if (member) member.busy = true;
    GameState.save();
    return exp;
  },

  checkAll() {
    const now = Date.now(); let changed = false;
    GameState.expeditions.forEach(e => { if (e.status === 'active' && now >= e.endTime) { this.complete(e); changed = true; } });
    if (changed) GameState.save();
  },

  complete(exp) {
    exp.status = 'completed';
    const member = GameState.members.find(m => m.id === exp.memberId);
    if (member) member.busy = false;
    const count = RNG.int(1, 3);
    const world = Worlds.get(exp.worldId);
    for (let i = 0; i < count; i++) {
      GameState.treasureMaps.push({ id: 'map_'+Date.now()+'_'+i, name: (world?world.name:'未知')+'藏宝图', quality: this.rollQuality(member), worldId: exp.worldId, obtainedAt: Date.now() });
    }
    if (member) member.exp = (member.exp||0) + RNG.int(10, 30);
    GameState.stats.totalMaps += count;
  },

  rollQuality(member) {
    const base = member ? ({white:0,green:1,blue:2,purple:3,orange:4}[member.quality]||1) : 1;
    const roll = RNG.int(1, 100);
    if (roll >= 95-base*3) return 'orange';
    if (roll >= 80-base*2) return 'purple';
    if (roll >= 50-base) return 'blue';
    if (roll >= 30) return 'green';
    return 'white';
  },

  getActive() { return GameState.expeditions.filter(e => e.status==='active'); },
  getCompleted() { return GameState.expeditions.filter(e => e.status==='completed'); },
  getRemaining(e) { if (e.status!=='active') return '已完成'; const r=Math.max(0,e.endTime-Date.now()); const m=Math.floor(r/60000); return m+':'+String(Math.floor(r%60000/1000)).padStart(2,'0'); },
};

  <script>
/* === dig.js - 挖宝系统 === */

const DigSystem = {
  init() { this.checkAll(); },

  start(mapId, mode) {
    const map = GameState.treasureMaps.find(m => m.id === mapId);
    if (!map) return null;
    const durMap = { white:60000, green:90000, blue:120000, purple:180000, orange:300000 };
    const dur = mode==='manual' ? 30000 : (durMap[map.quality]||60000);
    const now = Date.now();
    const dig = { id: 'dig_'+Date.now()+'_'+RNG.int(0,9999), mapId, mode, quality:map.quality, startTime:now, duration:dur, endTime:now+dur, status:'active' };
    const idx = GameState.treasureMaps.indexOf(map);
    if (idx>=0) GameState.treasureMaps.splice(idx,1);
    GameState.digs.push(dig);
    GameState.save();
    return dig;
  },

  checkAll() {
    const now = Date.now(); let changed = false;
    GameState.digs.forEach(d => { if (d.status==='active' && now>=d.endTime) { this.complete(d); changed=true; } });
    if (changed) GameState.save();
  },

  complete(dig) {
    dig.status = 'completed';
    GameState.stats.totalDigs++;
    /* 藏品：使用 ItemDB 统一掉落，与 UI 手动挖宝对齐 */
    const itemQuality = typeof ItemDB !== 'undefined' ? ItemDB.rollQuality(GameState.player.level) : dig.quality;
    const artifact = typeof ItemDB !== 'undefined' ? ItemDB.randomArtifact(itemQuality) : this.generateArtifact(dig.quality);
    if (artifact) {
      GameState.collection.push({
        id: 'col_' + Date.now() + '_' + RNG.int(0, 9999),
        name: artifact.name,
        quality: itemQuality,
        description: artifact.desc || '从' + dig.quality + '藏宝图中挖掘的' + itemQuality + '品藏品'
      });
    }
    /* 材料：使用 ItemDB 统一掉落 */
    if (RNG.int(1, 100) <= 40) {
      const mat = typeof ItemDB !== 'undefined' ? ItemDB.randomMaterial() : { name: '灵石碎片' };
      const exist = GameState.materials.find(m => m.name === mat.name);
      if (exist) exist.count += RNG.int(1, 3);
      else GameState.materials.push({ id: 'mat_' + Date.now(), name: mat.name, count: RNG.int(1, 3) });
    }
    /* 装备：使用 ItemDB 统一掉落 */
    if (dig.quality !== 'white' && dig.quality !== 'green' && RNG.int(1, 100) <= 20) {
      const eq = typeof ItemDB !== 'undefined' ? ItemDB.randomEquipment(dig.quality) : this.generateEquipment(dig.quality);
      GameState.equipment.push({ id: 'eq_' + Date.now(), name: eq.name, quality: dig.quality, type: eq.type || '装备' });
    }
    const goldMultiplier = { white:1, green:1.5, blue:2, purple:3, orange:5 };
    const goldRwd = Math.floor(RNG.int(50, 150) * (goldMultiplier[dig.quality] || 1));
    GameState.player.gold += goldRwd;
    GameState.stats.totalGold += goldRwd;
  },

  generateArtifact(mapQuality) {
    const qOrder=['white','green','blue','purple','orange']; const pref=['残缺的','完整的','精美的','大师级','传说级']; const types=['青铜鼎','玉璧','夜明珠','古剑','宝镜','琉璃盏','金印','竹简','香炉','舍利'];
    let idx=qOrder.indexOf(mapQuality); const r=RNG.int(1,100);
    if(r>=90&&idx<4)idx++; else if(r>=70&&idx<3)idx=Math.min(idx+1,4); else if(r<=10&&idx>0)idx--; else if(r<=25&&idx>0)idx=Math.max(idx-1,0);
    return { id:'col_'+Date.now(), name:pref[idx]+types[RNG.int(0,9)], quality:qOrder[idx], description:'从'+mapQuality+'藏宝图中挖掘的'+qOrder[idx]+'品藏品' };
  },

  generateEquipment(mapQuality) {

  update() {
    const a=GameState.auction; const now=Date.now();
    if(a.phase==='idle') this.startRound();
    else if(a.phase==='listing'&&now>=a.roundEnd) this.phaseActive();
    else if(a.phase==='active') { this.npcBid(); if(now>=a.roundEnd) this.phaseSettled(); }
  },

  startRound() {
    const a=GameState.auction; a.phase='listing'; a.roundEnd=Date.now()+this.phaseDurations.listing; a.listings=[]; a.activeLots=[];
    for(let i=0;i<RNG.int(3,6);i++) a.listings.push(this.generateLot());
    GameState.save();
  },

  phaseActive() {
    const a=GameState.auction; a.phase='active'; a.roundEnd=Date.now()+this.phaseDurations.active;
    a.activeLots=a.listings.map(l=>({...l,currentBid:l.startPrice,highBidder:null,bidCount:0}));
    a.listings=[];
    GameState.save();
  },

  phaseSettled() {
    const a=GameState.auction; a.phase='settled'; a.roundEnd=Date.now()+this.phaseDurations.settled;
    a.activeLots.forEach(lot=>{
      if(lot.seller==='player'&&lot.highBidder&&lot.currentBid>lot.startPrice) GameState.player.gold+=lot.currentBid;
      /* 玩家竞拍成功：物品加入收藏 */
      if(lot.highBidder==='player'&&lot.seller!=='player') {
        GameState.collection.push({id:'lot_'+Date.now()+'_'+RNG.int(0,9999),name:lot.name,quality:lot.quality||'blue'});

    setTimeout(()=>{a.phase='idle';GameState.save();},this.phaseDurations.settled);

    GameState.auction.listings.push({id:'lot_'+Date.now(),name:item.name,quality:item.quality,startPrice:price,seller:'player'});
    GameState.save(); return true;

  playerBid(lotId) {
    const lot=GameState.auction.activeLots.find(l=>l.id===lotId);
    if(!lot||(lot.highBidder&&!lot.highBidder.startsWith('npc_'))) return false;

    });

  generateLot() {

    { id: 'reforge',     name: '重铸',          icon: '🔨',  cost: [{ type:'gold', amount:200 },{ type:'material', name:'星辰砂', count:2 }], result:{type:'reforge'}, unlockLevel:2 },
    { id: 'diamond_bag', name: '钻石',          icon: '💎', cost: [{ type:'gold', amount:500 },{ type:'material', name:'五行石', count:5 }], result:{type:'diamond',amount:1}, unlockLevel:4 },
  ],

  init() {},

  /* 获取已解锁配方 */
  getAvailable() {
    return this.recipes.filter(r => r.unlockLevel <= GameState.buildings.workshop);
  },

  /* 检查材料是否足够 */
  canCraft(recipeId) {
    const recipe = this.recipes.find(r => r.id === recipeId);
    if (!recipe) return false;
    return recipe.cost.every(c => {
      if (c.type === 'gold') return GameState.player.gold >= c.amount;
      if (c.type === 'material') {
        const mat = GameState.materials.find(m => m.name === c.name);
        return mat && mat.count >= c.count;
      }
      return false;
    });
  },

  /* 执行合成 */
  craft(recipeId) {
    const recipe = this.recipes.find(r => r.id === recipeId);
    if (!recipe || !this.canCraft(recipeId)) return null;

    /* 消耗材料 */
    recipe.cost.forEach(c => {
      if (c.type === 'gold') GameState.player.gold -= c.amount;
      if (c.type === 'material') {
        const mat = GameState.materials.find(m => m.name === c.name);
        if (mat) mat.count -= c.count;
      }
    });

    /* 产出 */
    switch (recipe.result.type) {
      case 'gold':
        GameState.player.gold += recipe.result.amount;
        break;
      case 'diamond':
        GameState.player.diamond += recipe.result.amount;
        break;
      case 'map':
        GameState.treasureMaps.push({
          id: 'map_' + Date.now(),
          name: recipe.result.quality + '品合成藏宝图',
          quality: recipe.result.quality,
          worldId: 'beginner_village',
          obtainedAt: Date.now(),
        });
        break;
      case 'reforge':
        /* 随机升级一件装备品质 */
        if (GameState.equipment.length > 0) {
          const qOrder = ['white','green','blue','purple','orange'];
          const item = GameState.equipment[RNG.int(0, GameState.equipment.length - 1)];
          const idx = qOrder.indexOf(item.quality);
          if (idx < 4) {
            item.quality = qOrder[idx + 1];
            item.name = '重铸·' + item.name;
          }
        }
        break;
    }

    /* 清理0数量材料 */
    GameState.materials = GameState.materials.filter(m => m.count > 0);
    GameState.save();
    return recipe;
  },
};

  <script>
/* === puzzle.js - 滑动拼图 === */

class PuzzleGame extends MinigameBase {
  static id = 'puzzle';
  static name = '乾坤挪移';
  static icon = '🧩';
  static description = '滑动复原图片';
  static difficulty = 2;

  init() {
    this.size = 3;
    this.cellSize = 0; this.offsetX = 0; this.offsetY = 0;
    this.board = [];
    this.emptyPos = { r: 2, c: 2 };
    this.moves = 0;
  }

  start() {
    super.start();
    this.moves = 0;
    this.board = [];
    for (let r = 0; r < this.size; r++) {
      this.board[r] = [];
      for (let c = 0; c < this.size; c++)
        this.board[r][c] = r === 2 && c === 2 ? 0 : r * this.size + c + 1;
    }
    this.emptyPos = { r: 2, c: 2 };
    this.shuffle(30);
  }

  shuffle(n) {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (let i = 0; i < n; i++) {
      const valid = dirs.filter(([dr,dc]) => {
        const nr = this.emptyPos.r + dr, nc = this.emptyPos.c + dc;
        return nr >= 0 && nr < this.size && nc >= 0 && nc < this.size;
      });
      const [dr,dc] = valid[RNG.int(0, valid.length - 1)];
      const er = this.emptyPos.r, ec = this.emptyPos.c;
      this.board[er][ec] = this.board[er + dr][ec + dc];
      this.board[er + dr][ec + dc] = 0;
      this.emptyPos.r += dr; this.emptyPos.c += dc;
    }
  }

  isSolved() {
    for (let r = 0; r < this.size; r++)
      for (let c = 0; c < this.size; c++) {
        if (r === 2 && c === 2) continue;
        if (this.board[r][c] !== r * this.size + c + 1) return false;
      }
    return true;
  }

  render() {
    const W = Game.width, H = Game.height;
    const top = 100;
    const boardSize = Math.min(W - 32, H - top - 80);
    this.cellSize = Math.floor(boardSize / this.size);
    const totalSize = this.cellSize * this.size;
    this.offsetX = Math.floor((W - totalSize) / 2);
    this.offsetY = top;

    Renderer.text('已移动: ' + this.moves + ' 步', W / 2, top - 12, { color: '#666', font: '12px -apple-system, sans-serif', align: 'center' });

    for (let r = 0; r < this.size; r++)
      for (let c = 0; c < this.size; c++) {
        const v = this.board[r][c];
        const x = this.offsetX + c * this.cellSize, y = this.offsetY + r * this.cellSize;
        if (v === 0) {
          Renderer.rect(x + 2, y + 2, this.cellSize - 4, this.cellSize - 4, '#E8E8E8');
        } else {
          Renderer.roundRect(x + 2, y + 2, this.cellSize - 4, this.cellSize - 4, 6, '#3B5998');
          Renderer.centerText(String(v), x + this.cellSize / 2, y + this.cellSize / 2, { color: '#FFF', font: 'bold 20px -apple-system, sans-serif' });
        }
      }
  }

  handleInput(pos) {
    if (this.state !== 'playing') return;

class MemoryGame extends MinigameBase {
  static id = 'memory';
  static name = '万象归宗';

  static description = '翻牌配对记忆';
  static difficulty = 2;

  init() {
    this.pairs = 6;
    this.cards = [];
    this.flipped = [];
    this.matched = [];
    this.firstIdx = null;
    this.flipLock = false;
    this.flipTimer = 0;
    this.cols = 4;
    this.cardW = 0; this.cardH = 0;
    this.offsetX = 0; this.offsetY = 0;
    this.guesses = 0;
  }

  start() {
    super.start();
    this.guesses = 0;
    const icons = ['🏺','💎','🗺️','⚔️','🛡️','🔮','📜','🧭'];
    const pool = [];
    for (let i = 0; i < this.pairs; i++) pool.push({ icon: icons[i], id: i }, { icon: icons[i], id: i });
    /* 洗牌 */
    for (let i = pool.length - 1; i > 0; i--) {
      const j = RNG.int(0, i);
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    this.cards = pool;
    this.flipped = new Array(pool.length).fill(false);
    this.matched = new Array(pool.length).fill(false);
    this.firstIdx = null;
    this.flipLock = false;
  }

  render() {
    const W = Game.width, H = Game.height;
    const top = 100;
    const rows = Math.ceil(this.cards.length / this.cols);
    this.cardW = Math.floor((W - 48) / this.cols);
    this.cardH = Math.floor((H - top - 80) / rows);
    this.offsetX = Math.floor((W - this.cardW * this.cols) / 2);
    this.offsetY = top;

    Renderer.text('尝试: ' + this.guesses + ' 次', W / 2, top - 12, { color: '#666', font: '12px -apple-system, sans-serif', align: 'center' });

    this.cards.forEach((card, i) => {
      const col = i % this.cols, row = Math.floor(i / this.cols);
      const x = this.offsetX + col * this.cardW + 3;
      const y = this.offsetY + row * this.cardH + 3;

      if (this.matched[i]) {
        Renderer.roundRect(x, y, this.cardW - 6, this.cardH - 6, 8, '#E6F7E6');
        Renderer.centerText(card.icon, x + (this.cardW - 6) / 2, y + (this.cardH - 6) / 2, { font: '24px -apple-system, sans-serif' });
      } else if (this.flipped[i]) {
        Renderer.roundRect(x, y, this.cardW - 6, this.cardH - 6, 8, '#FFFFFF');
        Renderer.centerText(card.icon, x + (this.cardW - 6) / 2, y + (this.cardH - 6) / 2, { font: '24px -apple-system, sans-serif' });
      } else {
        Renderer.roundRect(x, y, this.cardW - 6, this.cardH - 6, 8, '#3B5998');
        Renderer.centerText('?', x + (this.cardW - 6) / 2, y + (this.cardH - 6) / 2, { color: '#FFF', font: 'bold 20px -apple-system, sans-serif' });
      }
    });
  }

  handleInput(pos) {
    if (this.state !== 'playing' || this.flipLock) return;
    const col = Math.floor((pos.x - this.offsetX) / this.cardW);
    const row = Math.floor((pos.y - this.offsetY) / this.cardH);
    const idx = row * this.cols + col;
    if (idx < 0 || idx >= this.cards.length || this.flipped[idx] || this.matched[idx]) return;

    this.flipped[idx] = true;

    if (this.firstIdx === null) {
      this.firstIdx = idx;
    } else {
      this.guesses++;
      const a = this.cards[this.firstIdx];
      const b = this.cards[idx];
      if (a.id === b.id) {
        this.matched[this.firstIdx] = true;
        this.matched[idx] = true;
        this.firstIdx = null;
        if (this.matched.every(Boolean)) { this.state = 'won'; this.score = Math.max(100, 600 - this.guesses * 15); }
      } else {
        this.flipLock = true;
        const f = this.firstIdx;
        setTimeout(() => { this.flipped[f] = false; this.flipped[idx] = false; this.firstIdx = null; this.flipLock = false; }, 800);
      }
    }
  }
}

/* === cipher.js - 密码破译 === */

class CipherGame extends MinigameBase {
  static id = 'cipher';
  static name = '天机破译';
  static icon = '🔐';
  static description = '猜数字密码';
  static difficulty = 3;

  init() {
    this.codeLength = 4;
    this.code = [];
    this.history = [];
    this.input = '';
    this.keys = [];
    this.keyW = 0; this.keyH = 0;
    this.offsetX = 0; this.offsetY = 0;
    this.maxGuesses = 10;
  }

  start() {
    super.start();
    this.code = [];
    for (let i = 0; i < this.codeLength; i++) this.code.push(RNG.int(1, 9));
    this.history = [];
    this.input = '';
  }

  render() {
    const W = Game.width, H = Game.height;
    const top = 90;
    const historyH = 160;

    /* 输入区 */
    Renderer.text('剩余次数: ' + (this.maxGuesses - this.history.length), W / 2, top, { color: '#666', font: '12px -apple-system, sans-serif', align: 'center' });

    const inputY = top + 24;
    for (let i = 0; i < this.codeLength; i++) {
      const digit = this.input[i] || '_';
      const bx = W / 2 - 40 + i * 22;
      Renderer.roundRect(bx, inputY, 20, 28, 4, '#F0F0F0');
      Renderer.centerText(digit, bx + 10, inputY + 14, { color: '#3B5998', font: 'bold 14px -apple-system, sans-serif' });
    }

    /* 历史记录 */
    const histY = inputY + 40;
    this.history.forEach((h, idx) => {
      const y = histY + idx * 18;
      Renderer.text(h.guess.join('') + '  →  ' + h.feedback, 24, y + 12, { color: '#333', font: '12px monospace' });
    });

    /* 数字键盘 */
    const keypadTop = Math.max(histY + 180, H - 220);
    this.keyW = (W - 48) / 3;
    this.keyH = 44;
    this.offsetX = 16;
    this.offsetY = keypadTop;

    for (let n = 1; n <= 9; n++) {
      const col = (n - 1) % 3, row = Math.floor((n - 1) / 3);
      const kx = this.offsetX + col * (this.keyW + 8);
      const ky = this.offsetY + row * (this.keyH + 4);
      Renderer.roundRect(kx, ky, this.keyW, this.keyH, 8, '#FFFFFF');
      Renderer.centerText(String(n), kx + this.keyW / 2, ky + this.keyH / 2, { color: '#3B5998', font: 'bold 18px -apple-system, sans-serif' });
    }

    /* 删除键 */
    const delY = this.offsetY + 3 * (this.keyH + 4);
    Renderer.roundRect(W / 2 - 60, delY, 56, this.keyH, 8, '#FFF3F0');
    Renderer.centerText('⌫', W / 2 - 32, delY + this.keyH / 2, { color: '#E53935', font: '14px -apple-system, sans-serif' });

    /* 确认键 */
    Renderer.roundRect(W / 2 + 4, delY, 56, this.keyH, 8, '#E8F5E9');
    Renderer.centerText('✓', W / 2 + 32, delY + this.keyH / 2, { color: '#43A047', font: 'bold 16px -apple-system, sans-serif' });
  }

  handleInput(pos) {
    if (this.state !== 'playing') return;

    const tapCol = Math.floor((pos.x - this.offsetX) / (this.keyW + 8));
    const tapRow = Math.floor((pos.y - this.offsetY) / (this.keyH + 4));

    if (tapRow >= 0 && tapRow < 3 && tapCol >= 0 && tapCol < 3) {
      const n = tapRow * 3 + tapCol + 1;
      if (this.input.length < this.codeLength) this.input += String(n);
      return;
    }

    const delY = this.offsetY + 3 * (this.keyH + 4);
    const W = Game.width;
    if (pos.x >= W / 2 - 60 && pos.x <= W / 2 - 4 && pos.y >= delY && pos.y <= delY + this.keyH) {
      this.input = this.input.slice(0, -1);
      return;
    }

    if (pos.x >= W / 2 + 4 && pos.x <= W / 2 + 60 && pos.y >= delY && pos.y <= delY + this.keyH) {
      if (this.input.length === this.codeLength) {
        const guess = this.input.split('').map(Number);
        const a = []; let bulls = 0, cows = 0;
        const codeCopy = [...this.code];
        /* bulls */
        for (let i = 0; i < this.codeLength; i++) {
          if (guess[i] === codeCopy[i]) { bulls++; codeCopy[i] = -1; guess[i] = -2; }
        }
        /* cows */
        for (let i = 0; i < this.codeLength; i++) {
          if (guess[i] === -2) continue;
          const j = codeCopy.indexOf(guess[i]);
          if (j >= 0) { cows++; codeCopy[j] = -1; }
        }
        const fb = 'A'.repeat(bulls) + 'B'.repeat(cows) || '0';
        this.history.push({ guess: this.input.split('').map(Number), feedback: fb });
        this.input = '';

        if (bulls === this.codeLength) { this.state = 'won'; this.score = Math.max(100, 1000 - this.history.length * 80); }
        else if (this.history.length >= this.maxGuesses) { this.state = 'lost'; }
      }
    }
  }
}
MinigameRegistry.register(CipherGame);

/* === maze.js - 迷宫探索 === */

class MazeGame extends MinigameBase {
  static id = 'maze';
  static name = '古墓迷踪';
  static icon = '🌀';
  static description = '走出迷宫';
  static difficulty = 2;

  init() {
    this.mazeW = 9; this.mazeH = 9;
    this.cellSize = 0;
    this.offsetX = 0; this.offsetY = 0;
    this.maze = [];
    this.playerPos = { r: 0, c: 0 };
    this.goalPos = { r: 6, c: 6 };
    this.steps = 0;
  }

  start() {
    super.start();
    this.steps = 0;
    this.generateMaze();
    this.playerPos = { r: 0, c: 0 };
    this.goalPos = { r: this.mazeH - 1, c: this.mazeW - 1 };
  }

  generateMaze() {
    /* 简单迷宫：全墙，DFS打通 */
    this.maze = Array.from({ length: this.mazeH }, () => Array(this.mazeW).fill(1));
    const stack = [{ r: 0, c: 0 }];
    this.maze[0][0] = 0;
    const dirs = [[-2,0],[2,0],[0,-2],[0,2]];

    while (stack.length) {
      const cur = stack[stack.length - 1];
      const valid = dirs.filter(([dr,dc]) => {
        const nr = cur.r + dr, nc = cur.c + dc;
        return nr >= 0 && nr < this.mazeH && nc >= 0 && nc < this.mazeW && this.maze[nr][nc] === 1;
      });
      if (valid.length) {
        const [dr,dc] = valid[RNG.int(0, valid.length - 1)];
        this.maze[cur.r + dr / 2][cur.c + dc / 2] = 0;
        this.maze[cur.r + dr][cur.c + dc] = 0;
        stack.push({ r: cur.r + dr, c: cur.c + dc });
      } else {
        stack.pop();
      }
    }
  }

  render() {
    const W = Game.width, H = Game.height;
    const top = 90;

    this.cellSize = Math.floor(Math.min(W - 16, H - top - 40) / Math.max(this.mazeW, this.mazeH));
    const totalW = this.cellSize * this.mazeW;
    const totalH = this.cellSize * this.mazeH;
    this.offsetX = Math.floor((W - totalW) / 2);
    this.offsetY = top;

    Renderer.text('步数: ' + this.steps, W / 2, top - 12, { color: '#666', font: '12px -apple-system, sans-serif', align: 'center' });

    for (let r = 0; r < this.mazeH; r++)
      for (let c = 0; c < this.mazeW; c++) {
        const x = this.offsetX + c * this.cellSize;
        const y = this.offsetY + r * this.cellSize;
        if (this.maze[r][c] === 1) {
          Renderer.rect(x, y, this.cellSize, this.cellSize, '#3B5998');
        } else {
          Renderer.rect(x, y, this.cellSize, this.cellSize, '#F5F5F5');
        }
      }

    /* 终点 */
    const gx = this.offsetX + this.goalPos.c * this.cellSize;
    const gy = this.offsetY + this.goalPos.r * this.cellSize;
    Renderer.centerText('🚩', gx + this.cellSize / 2, gy + this.cellSize / 2, { font: '16px -apple-system, sans-serif' });

    /* 玩家 */
    const px = this.offsetX + this.playerPos.c * this.cellSize;
    const py = this.offsetY + this.playerPos.r * this.cellSize;
    Renderer.centerText('🧑', px + this.cellSize / 2, py + this.cellSize / 2, { font: '16px -apple-system, sans-serif' });
  }

  handleInput(pos) {
    if (this.state !== 'playing') return;
    const col = Math.floor((pos.x - this.offsetX) / this.cellSize);
    const row = Math.floor((pos.y - this.offsetY) / this.cellSize);
    if (row < 0 || row >= this.mazeH || col < 0 || col >= this.mazeW) return;

    const dr = Math.abs(row - this.playerPos.r);
    const dc = Math.abs(col - this.playerPos.c);
    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
      if (this.maze[row][col] === 0) {
        this.playerPos = { r: row, c: col };
        this.steps++;
        if (row === this.goalPos.r && col === this.goalPos.c) {
          this.state = 'won';
          this.score = Math.max(100, 500 - this.steps * 5);
        }
      }
    }
  }
}
MinigameRegistry.register(MazeGame);

  <script>
/* === connect.js - 连连看 === */

class ConnectGame extends MinigameBase {
  static id = 'connect';
  static name = '灵珠连线';
  static icon = '💎';
  static description = '点击消除相连';
  static difficulty = 1;

  init() {
    this.rows = 7; this.cols = 7;
    this.colors = 5;
    this.grid = [];
    this.selected = null;
    this.cellSize = 0;
    this.offsetX = 0; this.offsetY = 0;
    this.removals = 0;
  }

  start() {
    super.start();
    this.removals = 0;
    this.selected = null;
    this.grid = [];
    for (let r = 0; r < this.rows; r++) {
      this.grid[r] = [];
      for (let c = 0; c < this.cols; c++)
        this.grid[r][c] = RNG.int(1, this.colors);
    }
  }

  render() {
    const W = Game.width, H = Game.height;
    const top = 100;
    this.cellSize = Math.floor(Math.min(W - 16, H - top - 40) / Math.max(this.rows, this.cols));
    const totalW = this.cellSize * this.cols;
    this.offsetX = Math.floor((W - totalW) / 2);
    this.offsetY = top;

    const palette = ['#E53935','#43A047','#1E88E5','#FB8C00','#8E24AA'];

    Renderer.text('消除: ' + this.removals, W / 2, top - 12, { color: '#666', font: '12px -apple-system, sans-serif', align: 'center' });

    for (let r = 0; r < this.rows; r++)
      for (let c = 0; c < this.cols; c++) {
        if (this.grid[r][c] === 0) continue;
        const x = this.offsetX + c * this.cellSize + 2;
        const y = this.offsetY + r * this.cellSize + 2;
        const s = this.cellSize - 4;
        const color = palette[(this.grid[r][c] - 1) % palette.length];
        const active = this.selected && this.selected.r === r && this.selected.c === c;

        Renderer.roundRect(x, y, s, s, 6, color);
        if (active) Renderer.roundRect(x - 2, y - 2, s + 4, s + 4, 8, 'rgba(255,255,255,0.4)');
      }
  }

  floodCount(r, c, color, visited) {
    const key = r + ',' + c;
    if (r < 0 || r >= this.rows || c < 0 || c >= this.cols) return 0;
    if (visited.has(key) || this.grid[r][c] !== color) return 0;
    visited.add(key);
    return 1 + this.floodCount(r-1,c,color,visited) + this.floodCount(r+1,c,color,visited)
             + this.floodCount(r,c-1,color,visited) + this.floodCount(r,c+1,color,visited);
  }

  floodRemove(r, c, color) {
    if (r < 0 || r >= this.rows || c < 0 || c >= this.cols) return;
    if (this.grid[r][c] !== color) return;
    this.grid[r][c] = 0;
    this.floodRemove(r-1,c,color); this.floodRemove(r+1,c,color);
    this.floodRemove(r,c-1,color); this.floodRemove(r,c+1,color);
  }

  applyGravity() {
    for (let c = 0; c < this.cols; c++) {
      let write = this.rows - 1;
      for (let r = this.rows - 1; r >= 0; r--) {
        if (this.grid[r][c] !== 0) {
          this.grid[write][c] = this.grid[r][c];
          if (write !== r) this.grid[r][c] = 0;
          write--;
        }
      }
    }
  }

  handleInput(pos) {
    if (this.state !== 'playing') return;
    const col = Math.floor((pos.x - this.offsetX) / this.cellSize);
    const row = Math.floor((pos.y - this.offsetY) / this.cellSize);
    if (row < 0 || row >= this.rows || col < 0 || col >= this.cols) return;
    if (this.grid[row][col] === 0) return;

    const color = this.grid[row][col];
    const count = this.floodCount(row, col, color, new Set());
    if (count < 2) return;

    this.floodRemove(row, col, color);
    this.removals += count;
    this.applyGravity();

    /* 检查游戏是否结束（没有可消除的相邻块） */
    let hasMove = false;
    for (let r = 0; r < this.rows && !hasMove; r++)
      for (let c = 0; c < this.cols && !hasMove; c++) {
        if (this.grid[r][c] === 0) continue;
        if (this.floodCount(r, c, this.grid[r][c], new Set()) >= 2) hasMove = true;
      }

    if (!hasMove) {
      this.state = 'won';
      this.score = this.removals * 10;
    }
  }
}
MinigameRegistry.register(ConnectGame);

  <script>
/* === melody.js - 旋律记忆 (Simon Says) === */

class MelodyGame extends MinigameBase {
  static id = 'melody';
  static name = '仙音回响';
  static icon = '🎵';
  static description = '记忆旋律顺序';
  static difficulty = 3;

  init() {
    this.colors = 4;
    this.sequence = [];
    this.playerIdx = 0;
    this.phase = 'wait';  /* wait / playback / input / result */
    this.playbackIdx = 0;
    this.playbackTimer = 0;
    this.tiles = [];
    this.tileSize = 0;
    this.tilePositions = [];
  }

  start() {
    super.start();
    this.sequence = [RNG.int(0, this.colors - 1)];
    this.playerIdx = 0;
    this.phase = 'playback';
    this.playbackIdx = 0;
    this.playbackTimer = Date.now();
  }

  render() {
    const W = Game.width, H = Game.height;
    const top = 100;
    this.tileSize = Math.floor((W - 48) / 2);
    const gap = 12;
    const totalH = this.tileSize * 2 + gap;
    const startY = top + Math.max(0, Math.floor((H - top - 80 - totalH) / 2));

    this.tilePositions = [
      { x: 16,               y: startY },
      { x: 16 + this.tileSize + gap, y: startY },
      { x: 16,               y: startY + this.tileSize + gap },
      { x: 16 + this.tileSize + gap, y: startY + this.tileSize + gap },
    ];

    const palette = ['#E53935','#43A047','#1E88E5','#FB8C00'];
    const names = ['角','徵','宫','商'];

    this.tilePositions.forEach((tp, i) => {
      let color = palette[i];
      /* 回放中高亮 */
      if (this.phase === 'playback' && i === this.sequence[this.playbackIdx]) {
        color = '#FFFFFF';
      } else if (this.phase === 'input' && this._lastFlash === i) {
        color = '#FFFFFF';
      }
      Renderer.roundRect(tp.x, tp.y, this.tileSize, this.tileSize, 12, color);
      Renderer.centerText(names[i], tp.x + this.tileSize / 2, tp.y + this.tileSize / 2, {
        color: this.phase === 'playback' && i === this.sequence[this.playbackIdx] ? '#333' : '#FFF',
        font: 'bold 24px -apple-system, sans-serif',
      });
    });

    /* 状态提示 */
    let hint = '';
    if (this.phase === 'playback') hint = '🎵 仔细听...';
    else if (this.phase === 'input') hint = '👆 重复旋律 (' + (this.playerIdx + 1) + '/' + this.sequence.length + ')';
    else if (this.phase === 'result') hint = '✅ 正确! 下一轮';

    Renderer.text(hint, W / 2, top - 12, { color: '#666', font: '12px -apple-system, sans-serif', align: 'center' });
    Renderer.text('长度: ' + this.sequence.length, W / 2, top + 8, { color: '#999', font: '11px -apple-system, sans-serif', align: 'center' });
  }

  /* 更新（由 Game.update 驱动回放计时） */
  update() {
    if (this.phase === 'playback') {
      const elapsed = Date.now() - this.playbackTimer;
      if (elapsed > 600) {
        this._lastFlash = null;
        this.playbackIdx++;
        this.playbackTimer = Date.now();
        if (this.playbackIdx >= this.sequence.length) {
          this.phase = 'input';
          this.playerIdx = 0;
          this.playbackIdx = 0;
        }
      } else if (elapsed > 450) {
        this._lastFlash = -1; // off
      }
    }
  }

  handleInput(pos) {
    if (this.state !== 'playing' || this.phase !== 'input') return;

    for (let i = 0; i < this.tilePositions.length; i++) {
      const tp = this.tilePositions[i];
      if (pos.x >= tp.x && pos.x <= tp.x + this.tileSize &&
          pos.y >= tp.y && pos.y <= tp.y + this.tileSize) {
        this._lastFlash = i;
        if (i === this.sequence[this.playerIdx]) {
          this.playerIdx++;
          if (this.playerIdx >= this.sequence.length) {
            /* 成功一轮 */
            if (this.sequence.length >= 10) {
              this.state = 'won';
              this.score = 10 * 20;
            } else {
              this.sequence.push(RNG.int(0, this.colors - 1));
              this.playerIdx = 0;
              this.phase = 'playback';
              this.playbackIdx = 0;
              this.playbackTimer = Date.now();
            }
          }
        } else {

  <script>
/* === renderer.js - 基础渲染器 === */

const Renderer = {

  ctx: null,

  init(ctx) {
    this.ctx = ctx;
  },

  /* 获取当前上下文 */
  c() {
    return this.ctx || Game.ctx;
  },

  /* --- 基础图形 --- */

  /* 填充矩形 */
  rect(x, y, w, h, color) {
    const ctx = this.c();
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  },

  /* 圆角矩形 */
  roundRect(x, y, w, h, r, color) {
    const ctx = this.c();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  },

  /* 描边圆角矩形 */
  strokeRoundRect(x, y, w, h, r, color, lineWidth = 1) {
    const ctx = this.c();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.stroke();
  },

  /* 圆形 */
  circle(cx, cy, r, color) {
    const ctx = this.c();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  },

  /* --- 卡片 --- */

  /* 带阴影的圆角卡片 */
  card(x, y, w, h, r = 10) {
    const ctx = this.c();
    /* 阴影 */
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.08)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 2;
    this.roundRect(x, y, w, h, r, '#FFFFFF');
    ctx.restore();

    /* 细边框 */
    this.strokeRoundRect(x, y, w, h, r, '#F0F0F0', 0.5);
  },

  /* --- 文字 --- */

  text(text, x, y, options = {}) {
    const ctx = this.c();
    const {
      color = '#1A1A1A',
      font = '14px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif',
      align = 'left',
      baseline = 'top',
      maxWidth
    } = options;

    ctx.fillStyle = color;
    ctx.font = font;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;

    if (maxWidth) {
      this.wrapText(text, x, y, maxWidth, color, font, align, baseline);
    } else {
      ctx.fillText(text, x, y);
    }
  },

  /* 居中文字 */
  centerText(text, x, y, options = {}) {
    this.text(text, x, y, { ...options, align: 'center', baseline: 'middle' });
  },

  /* 文字换行 */
  wrapText(text, x, y, maxWidth, color, font, align, baseline) {
    const ctx = this.c();
    ctx.fillStyle = color;
    ctx.font = font;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;

    const words = text.split('');
    let line = '';
    let lineY = y;
    const lineHeight = parseInt(font) * 1.4;

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i];
      if (ctx.measureText(testLine).width > maxWidth && line.length > 0) {
        ctx.fillText(line, x, lineY);
        line = words[i];
        lineY += lineHeight;
      } else {
        line = testLine;
      }
    }
    if (line) ctx.fillText(line, x, lineY);
  },

  /* --- 图片 --- */

  /* 裁切圆角图片 */
  clipImage(image, x, y, w, h, r) {
    const ctx = this.c();
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(image, x, y, w, h);
    ctx.restore();
  },

  /* --- 按钮 --- */

  btn(label, x, y, w, h, type = 'primary') {
    const ctx = this.c();
    const r = 6;
    const colors = {
      primary:   { bg: '#3B5998', text: '#FFFFFF' },
      secondary: { bg: '#F5F5F5', text: '#1A1A1A', border: '#E8E8E8' },
      danger:    { bg: '#FF4D4F', text: '#FFFFFF' },
    };
    const c = colors[type] || colors.primary;

    this.roundRect(x, y, w, h, r, c.bg);
    if (c.border) this.strokeRoundRect(x, y, w, h, r, c.border);
    this.centerText(label, x + w / 2, y + h / 2, {
      color: c.text,
      font: '13px -apple-system, "PingFang SC", sans-serif'
    });
  },

  /* --- 品质标签 --- */

  qualityBadge(quality, x, y, glow = false) {
    const colors = {
      green:  { bg: 'rgba(82,196,26,0.12)',  text: '#52C41A', label: '\u666e\u901a', glow: 'rgba(82,196,26,0.06)' },
      blue:   { bg: 'rgba(24,144,255,0.12)', text: '#1890FF', label: '\u7a00\u6709', glow: 'rgba(24,144,255,0.06)' },
      purple: { bg: 'rgba(114,46,209,0.12)', text: '#722ED1', label: '\u53f2\u8bd7', glow: 'rgba(114,46,209,0.06)' },
      orange: { bg: 'rgba(250,140,22,0.12)', text: '#FA8C16', label: '\u4f20\u8bf4', glow: 'rgba(250,140,22,0.06)' },
      red:    { bg: 'rgba(255,77,79,0.12)',  text: '#FF4D4F', label: '\u795e\u8bdd', glow: 'rgba(255,77,79,0.06)' },
    };
    const c = colors[quality] || colors.green;
    const w = 44, h = 20;

    /* 光晕 */
    if (glow) {
      this.roundRect(x - 3, y - 3, w + 6, h + 6, 12, c.glow);
    }

    this.roundRect(x, y, w, h, 10, c.bg);
    this.centerText(c.label, x + w / 2, y + h / 2, {
      color: c.text,
      font: 'bold 10px -apple-system, "PingFang SC", sans-serif'
    });
  },
};

/* 数值格式化 */
const FMT = {
  gold(n) { return n >= 1000 ? (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k' : String(n); },
  comma(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); },
  time(s) {
    if (s < 60) return s + '\u79d2';
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return sec > 0 ? m + '\u5206' + sec + '\u79d2' : m + '\u5206\u949f';
  },
};

      }

    UI.addArea(margin, top, 60, 30, () => { this.mode = 'list'; });

    const sy = top + 48;

    /* Step 1: 选择世界 */
    Renderer.text('选择探索世界', margin + 4, sy, {
      color: '#1A1A1A', font: 'bold 13px -apple-system, "PingFang SC", sans-serif',
    });

    let cy = sy + 28;
    /* 只显示已解锁的世界 (level 1 默认解锁荒古界) */

    availableWorlds.forEach((w, i) => {
      const col = i % 3;
      const row = Math.floor(i / 3);
      const bx = margin + col * ((W - margin * 2 - 16) / 3);
      const by = cy + row * 40;
      const bw = (W - margin * 2 - 16) / 3;

      const selected = this.selectedWorld === w.id;
      Renderer.roundRect(bx, by, bw, 32, 6,
        selected ? 'rgba(59,89,152,0.15)' : '#F0F0F0');
      Renderer.centerText(w.name, bx + bw / 2, by + 16, {
        color: selected ? '#3B5998' : '#666666',
        font: '12px -apple-system, "PingFang SC", sans-serif',
      });
      UI.addArea(bx, by, bw, 32, () => { this.selectedWorld = w.id; });
    });

    cy += Math.ceil(availableWorlds.length / 3) * 40 + 16;

    /* Step 2: 选择队员 */
    Renderer.text('选择队员', margin + 4, cy, {
      color: '#1A1A1A', font: 'bold 13px -apple-system, "PingFang SC", sans-serif',
    });
    cy += 28;

    const idleMembers = GameState.members.filter(m => {
      return !GameState.expeditions.some(e => e.memberId === m.id && e.status === 'active');

    if (idleMembers.length === 0) {
      Renderer.centerText('没有空闲队员', W / 2, cy + 20, {
        color: '#999999', font: '12px -apple-system, "PingFang SC", sans-serif',

    } else {

        const selected = this.selectedMember === m.id;
        const qColor = { white:'#999', green:'#52C41A', blue:'#1890FF', purple:'#722ED1', orange:'#FA8C16' }[m.quality] || '#999';

        Renderer.roundRect(margin, my, W - margin * 2, 32, 6,
          selected ? 'rgba(59,89,152,0.1)' : '#F9F9F9');

        Renderer.text(m.name, margin + 12, my + 16, {
          color: selected ? '#3B5998' : qColor,
          font: 'bold 13px -apple-system, "PingFang SC", sans-serif',
        });

          color: '#999999',
          font: '11px -apple-system, "PingFang SC", sans-serif',
        });

        UI.addArea(margin, my, W - margin * 2, 32, () => { this.selectedMember = m.id; });
      });
      cy += idleMembers.length * 40 + 8;
    }

    /* Step 3: 选择时长 */
    Renderer.text('探索时长', margin + 4, cy, {
      color: '#1A1A1A', font: 'bold 13px -apple-system, "PingFang SC", sans-serif',
    });
    cy += 28;

    this.durations.forEach((d, i) => {
      const dy = cy + i * 36;
      const selected = this.selectedDuration === d.value;

      Renderer.roundRect(margin, dy, W - margin * 2, 30, 6,
        selected ? 'rgba(59,89,152,0.1)' : '#F9F9F9');

      Renderer.text(d.label, margin + 12, dy + 15, {
        color: selected ? '#3B5998' : '#1A1A1A',
        font: '13px -apple-system, "PingFang SC", sans-serif',
      });
      Renderer.text(d.desc, W - margin - 12, dy + 15, {
        color: '#999999', font: '11px -apple-system, "PingFang SC", sans-serif',
        align: 'right',
      });

      UI.addArea(margin, dy, W - margin * 2, 30, () => { this.selectedDuration = d.value; });
    });
    cy += this.durations.length * 36 + 16;

    /* 确认派遣按钮 */
    const canDispatch = this.selectedWorld && this.selectedMember && this.selectedDuration;
    Renderer.btn('确认派遣', margin, cy, W - margin * 2, 44, canDispatch ? 'primary' : 'secondary');

    if (canDispatch) {
      UI.addArea(margin, cy, W - margin * 2, 44, () => {
        const timeReduction = typeof BuildingSystem !== 'undefined' ? BuildingSystem.getEffect('expedition').timeReduction / 100 : 0;
        const adjustedDuration = Math.floor(this.selectedDuration * (1 - timeReduction));
        const durationMinutes = Math.ceil(adjustedDuration / 60);
        const exp = ExpeditionSystem.dispatch(this.selectedWorld, this.selectedMember, durationMinutes);
        if (typeof AudioFX !== 'undefined') AudioFX.reward();
        GameState.toast('派遣成功！' + this.durations.find(d => d.value === this.selectedDuration).label + '后返回');
        this.mode = 'list';
        this.selectedWorld = null;
        this.selectedMember = null;
        this.selectedDuration = null;
      });
    }
  },

  handleClick(pos) {
    return UI.hitTest(pos) ? 'expedition' : null;

};

  <script>
/* === dig.js - 挖宝页面 === */

const DigPage = {

  /* 模式: bag / digging / result */
  mode: 'bag',

  /* 当前挖宝中 */
  currentDig: null,

  /* 自动模式计时 */
  autoTimer: null,

  init() {
    this.mode = 'bag';
    this.currentDig = null;
    this.autoTimer = null;
    this.autoDigRunning = false;
  },

  render() {
    UI.clearAreas();
    const W = Game.width, H = Game.height;

    Renderer.rect(0, 0, W, H, '#F5F5F5');
    UI.statusBar();

    if (this.mode === 'digging') {
      this.renderDigging();
    } else if (this.mode === 'result') {
      this.renderResult();
    } else {
      this.renderBag();
    }

    UI.bottomNav([
      { id: 'hall',      label: '大厅',   icon: '🏠' },
      { id: 'members',   label: '队员',   icon: '👥' },
      { id: 'inventory', label: '背包',   icon: '🎒' },
      { id: 'minigame',  label: '挖宝',   icon: '⛏️' },
    ], 'dig');
  },

  /* --- 藏宝图背包 --- */
  renderBag() {
    const W = Game.width, margin = 16;

    UI.pageTitle('挖宝营地', '选择一张藏宝图开始挖掘');

    const maps = GameState.treasureMaps;
    const contentY = 108;
    const contentH = Game.height - contentY - 60;

    /* 自动挖宝按钮 */
    const btnW = 140;
    Renderer.btn('自动挖宝 (全部)', W / 2 - btnW / 2, contentY, btnW, 32, 'primary');
    UI.addArea(W / 2 - btnW / 2, contentY, btnW, 32, () => {
      if (maps.length === 0) {
        GameState.toast('没有藏宝图');
        return;
      }
      /* 批量挖宝：每张图 3 秒 */
      this.autoDigAll(maps);
    });

    const listTop = contentY + 44;
    if (maps.length === 0) {
      Renderer.centerText('暂无藏宝图，派遣寻藏获取', W / 2, listTop + 60, {
        color: '#999999',
        font: '13px -apple-system, "PingFang SC", sans-serif',
      });
      return;
    }

    maps.forEach((map, i) => {
      const y = listTop + i * 72;
      const qColor = { white:'#999', green:'#52C41A', blue:'#1890FF', purple:'#722ED1', orange:'#FA8C16' }[map.quality] || '#999';

      Renderer.card(margin, y, W - margin * 2, 62, 8);
      Renderer.qualityBadge(map.quality, margin + 12, y + 12);

      Renderer.text(map.name || '藏宝图', margin + 56, y + 24, {
        color: qColor,
        font: 'bold 13px -apple-system, "PingFang SC", sans-serif',
      });

      const world = Worlds.get(map.worldId);
      Renderer.text('来源: ' + (world ? world.name : '未知'), margin + 56, y + 44, {
        color: '#999999',
        font: '11px -apple-system, "PingFang SC", sans-serif',
      });

      /* 手动挖宝按钮 */
      Renderer.btn('挖掘', W - margin - 70, y + 16, 56, 28, 'primary');
      UI.addArea(W - margin - 70, y + 16, 56, 28, () => {
        this.startSingleDig(map);
      });
    });
  },

  /* --- 挖宝中 --- */
  renderDigging() {
    const W = Game.width, H = Game.height;
    const dig = this.currentDig;
    if (!dig) { this.mode = 'bag'; return; }

    const elapsed = (Date.now() - dig.startTime) / 1000;
    const progress = Math.min(elapsed / dig.duration, 1);

    /* 背景 */
    Renderer.card(16, 120, W - 32, 300, 12);

    Renderer.centerText('⛏️', W / 2, 168, { font: '48px -apple-system, sans-serif' });
    Renderer.centerText('挖掘中...', W / 2, 220, {
      color: '#1A1A1A',
      font: 'bold 18px -apple-system, "PingFang SC", sans-serif',
    });

    /* 进度条 */
    const barX = 48, barY = 260, barW = W - 96, barH = 16;
    Renderer.roundRect(barX, barY, barW, barH, 8, '#F0F0F0');
    Renderer.roundRect(barX, barY, barW * progress, barH, 8, '#3B5998');

    const remainSec = Math.max(0, Math.ceil(dig.duration - elapsed));
    Renderer.centerText('剩余 ' + remainSec + ' 秒', W / 2, barY + 40, {
      color: '#999999',
      font: '13px -apple-system, "PingFang SC", sans-serif',
    });

    /* 加速按钮 */
    if (remainSec > 1) {
      Renderer.btn('看广告加速', W / 2 - 60, barY + 60, 120, 30, 'secondary');
      UI.addArea(W / 2 - 60, barY + 60, 120, 30, () => {
        GameState.toast('广告播放完成，挖掘加速!');
        this.completeDig(dig);
      });
    }
  },

  /* --- 挖宝结果 --- */
  renderResult() {
    const W = Game.width;
    const dig = this.currentDig;
    if (!dig) { this.mode = 'bag'; return; }

    Renderer.card(16, 120, W - 32, 340, 12);

    Renderer.centerText('🎉', W / 2, 168, { font: '48px -apple-system, sans-serif' });
    Renderer.centerText('挖掘完成!', W / 2, 216, {
      color: '#1A1A1A',
      font: 'bold 18px -apple-system, "PingFang SC", sans-serif',
    });

    /* 奖励列表 */
    if (dig.rewards && dig.rewards.length > 0) {
      const ry = 248;
      dig.rewards.forEach((r, i) => {
        const qColor = { white:'#999', green:'#52C41A', blue:'#1890FF', purple:'#722ED1', orange:'#FA8C16' }[r.quality] || '#999';
        Renderer.qualityBadge(r.quality, 40, ry + i * 36 - 10);
        Renderer.text(r.name, 84, ry + i * 36, {
          color: qColor,
          font: 'bold 13px -apple-system, "PingFang SC", sans-serif',
        });
        Renderer.text(r.type === 'gold' ? '💰 +' + r.amount : 'x' + (r.count || 1), W - 48, ry + i * 36, {
          color: '#666666',
          font: '12px -apple-system, "PingFang SC", sans-serif',
          align: 'right',
        });
      });
    }

    /* 继续按钮 */
    const btnY = 400;
    Renderer.btn('继续挖宝', W / 2 - 80, btnY, 160, 40, 'primary');
    UI.addArea(W / 2 - 80, btnY, 160, 40, () => {
      this.mode = 'bag';
      this.currentDig = null;
    });
  },

  /* --- 手动挖宝 --- */
  startSingleDig(map) {
    /* 从背包移除 */
    const idx = GameState.treasureMaps.indexOf(map);
    if (idx >= 0) GameState.treasureMaps.splice(idx, 1);
    GameState.save();

    this.currentDig = {
      mapId: map.id,
      startTime: Date.now(),
      duration: 3 + Math.random() * 5, /* 3~8 秒 */
      rewards: this.generateRewards(map.quality),
    };
    this.mode = 'digging';

    /* 定时完成 */
    setTimeout(() => {
      if (this.mode === 'digging') this.completeDig(this.currentDig);
    }, this.currentDig.duration * 1000);
  },

  /* --- 自动批量挖宝 --- */
  autoDigAll(maps) {
    const autoProcess = (remaining) => {
      if (remaining.length === 0) {
        GameState.toast('全部挖宝完成!');
        GameState.save();
        return;
      }
      const map = remaining[0];
      const idx = GameState.treasureMaps.indexOf(map);
      if (idx >= 0) GameState.treasureMaps.splice(idx, 1);
      GameState.save();

      const rewards = this.generateRewards(map.quality);
      rewards.forEach(r => this.collectReward(r));

      this.currentDig = {
        mapId: map.id,
        startTime: Date.now(),
        duration: 1,
        rewards: rewards,
      };

      setTimeout(() => {
        this.currentDig = null;
        autoProcess(remaining.slice(1));
      }, 800);
    };

    autoProcess([...maps]);
    GameState.toast('开始批量挖宝...');
  },

  /* --- 完成挖宝 --- */
  completeDig(dig) {
    if (!dig || !dig.rewards) return;
    dig.rewards.forEach(r => this.collectReward(r));
    this.mode = 'result';
    GameState.stats.totalDigs++;
    GameState.save();
  },

  /* --- 收集奖励 --- */
  collectReward(reward) {
    switch (reward.type) {
      case 'gold':
        GameState.player.gold += reward.amount;
        GameState.stats.totalGold += reward.amount;
        break;
      case 'item':
        /* 加入藏品背包 */
        GameState.collection.push({
          id: 'item_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          name: reward.name,
          quality: reward.quality,
          worldId: reward.worldId || 'huanggu',
          description: reward.desc || '一件古老的遗物',
        });
        break;
      case 'material':
        /* 加入材料 */
        const exist = GameState.materials.find(m => m.name === reward.name);
        if (exist) {
          exist.count += (reward.count || 1);
        } else {
          GameState.materials.push({
            id: 'mat_' + Date.now(),
            name: reward.name,
            count: reward.count || 1,
          });
        }
        break;
    }
  },

  /* --- 生成奖励 --- */
  generateRewards(quality) {
    const rewards = [];

    /* 金币 */
    const goldMultiplier = { white:1, green:1.5, blue:2, purple:3, orange:5 };
    const gold = Math.floor(RNG.int(50, 150) * (goldMultiplier[quality] || 1));
    rewards.push({ type: 'gold', amount: gold, quality: 'white', name: '金币' });

    /* 藏品掉落 */
    const itemChance = { white:30, green:45, blue:55, purple:65, orange:75 };
    if (RNG.chance(itemChance[quality] || 30)) {
      const itemQuality = typeof ItemDB !== 'undefined' ? ItemDB.rollQuality(GameState.player.level) : quality;
      const artifact = typeof ItemDB !== 'undefined' ? ItemDB.randomArtifact(itemQuality) : { name: '古剑碎片' };
      rewards.push({
        type: 'item',
        name: artifact.name,
        quality: itemQuality,
        desc: artifact.desc || '一件散发微光的古物',
      });
    }

    /* 材料掉落 */
    const matCount = RNG.int(0, 2);
    for (let i = 0; i < matCount; i++) {
      const mat = typeof ItemDB !== 'undefined' ? ItemDB.randomMaterial() : { name: '玄铁矿石' };
      rewards.push({
        type: 'material',
        name: mat.name,
        quality: 'white',
        count: RNG.int(1, 3),
      });
    }

    return rewards;
  },

  /* 按母品质骰子品质 */
  rollItemQuality(parentQuality) {
    const table = {
      white:  [70, 25,  5,  0,  0],
      green:  [30, 50, 15,  5,  0],
      blue:   [10, 30, 45, 12,  3],
      purple: [ 0, 10, 30, 50, 10],
      orange: [ 0,  0, 10, 35, 55],
    };
    const weights = table[parentQuality] || table.white;
    const keys = ['white', 'green', 'blue', 'purple', 'orange'];
    const total = weights.reduce((s, w) => s + w, 0);
    let roll = RNG.int(1, total);
    for (let i = 0; i < keys.length; i++) {
      roll -= weights[i];
      if (roll <= 0) return keys[i];
    }
    return 'white';
  },

  handleClick(pos) {
    return UI.hitTest(pos) ? 'dig' : null;
  }
};

          const idx = GameState.auction.listings.indexOf(listing);
          if (idx >= 0) GameState.auction.listings.splice(idx, 1);
          GameState.save();
          GameState.toast('已下架 ' + item.name);
        });
      });
    }

    /* 拍卖会按钮 */
    const auctionY = Game.height - 160;
    if (this.lots.length > 0) {
      Renderer.btn('参加拍卖会 (' + this.lots.length + ' 件拍品)', margin, auctionY, W - margin * 2, 44, 'primary');
      UI.addArea(margin, auctionY, W - margin * 2, 44, () => {
        this.mode = 'bidding';
        this.roundInfo = { startTime: Date.now(), duration: 30 };
      });
    } else {
      Renderer.btn('开始新拍卖会', margin, auctionY, W - margin * 2, 44, 'primary');
      UI.addArea(margin, auctionY, W - margin * 2, 44, () => {
        this.generateAuctionLots();
        this.mode = 'bidding';
        this.roundInfo = { startTime: Date.now(), duration: 30 };
      });
    }
  },

  /* --- 竞拍界面 --- */
  renderBidding(margin) {
    const W = Game.width;
    const contentY = 108;

    /* 倒计时 */
    const elapsed = (Date.now() - this.roundInfo.startTime) / 1000;
    const remain = Math.max(0, Math.ceil(this.roundInfo.duration - elapsed));

    UI.pageTitle('拍卖会', '剩余 ' + remain + ' 秒');

    if (this.lots.length === 0) {
      Renderer.centerText('所有拍品已成交', W / 2, 250, {
        color: '#999999',
        font: '14px -apple-system, "PingFang SC", sans-serif',
      });
      Renderer.btn('返回大厅', margin, 300, W - margin * 2, 40, 'primary');
      UI.addArea(margin, 300, W - margin * 2, 40, () => {
        this.mode = 'idle';
      });
      return;
    }

    /* 当前拍品 */
    const currentLot = this.lots[0];
    const item = currentLot.item;

    const cardY = contentY + 8;
    Renderer.card(margin, cardY, W - margin * 2, 200, 12);

    /* 拍品信息 */
    const qColor = { white:'#999', green:'#52C41A', blue:'#1890FF', purple:'#722ED1', orange:'#FA8C16' }[item.quality] || '#999';

    Renderer.centerText('🏺', W / 2, cardY + 30, { font: '36px -apple-system, sans-serif' });
    Renderer.centerText(item.name, W / 2, cardY + 66, {
      color: qColor,
      font: 'bold 16px -apple-system, "PingFang SC", sans-serif',
    });
    Renderer.centerText('起拍价: 💰' + currentLot.startPrice, W / 2, cardY + 90, {
      color: '#666666',
      font: '12px -apple-system, "PingFang SC", sans-serif',
    });

    /* 当前出价 */
    Renderer.text('当前出价: 💰' + currentLot.currentBid, margin + 16, cardY + 120, {
      color: '#3B5998',
      font: 'bold 14px -apple-system, "PingFang SC", sans-serif',
    });

    if (currentLot.bidderName) {
      Renderer.text('出价人: ' + currentLot.bidderName, margin + 16, cardY + 142, {
        color: '#999999',
        font: '11px -apple-system, "PingFang SC", sans-serif',
      });
    }

    /* 出价按钮 */
    const step = Math.floor(currentLot.startPrice * 0.2);
    const bidOptions = [step, step * 2, step * 3];
    const btnY = cardY + 162;

    bidOptions.forEach((amount, i) => {
      const bx = margin + 12 + i * ((W - margin * 2 - 24) / 3);
      const bw = (W - margin * 2 - 24) / 3;
      const price = currentLot.currentBid + amount;

      const canBid = GameState.player.gold >= price;
      Renderer.btn('出价 💰' + price, bx, btnY, bw, 32, canBid ? 'primary' : 'secondary');

      if (canBid) {
        UI.addArea(bx, btnY, bw, 32, () => {
          if (GameState.player.gold >= price) {
            GameState.player.gold -= price;
            currentLot.currentBid = price;
            currentLot.bidderId = 'player';
            currentLot.bidderName = GameState.player.name;
            GameState.save();
            GameState.toast('出价成功! 💰' + price);
          }
        });
      }
    });

    /* 成交按钮 (跳过等待) */
    Renderer.btn('立即成交', margin, btnY + 44, W - margin * 2, 36, 'secondary');
    UI.addArea(margin, btnY + 44, W - margin * 2, 36, () => {
      const sold = this.lots.shift();
      if (sold.bidderId === 'player') {
        GameState.collection.push({
          id: 'lot_' + Date.now() + '_' + RNG.int(0, 9999),
          name: sold.item.name,
          quality: sold.item.quality || 'blue'
        });
        GameState.toast('恭喜获得「' + sold.item.name + '」!');
      } else {
        GameState.player.gold += Math.floor(sold.startPrice * 0.5);
        GameState.stats.totalGold += Math.floor(sold.startPrice * 0.5);
        GameState.toast('流拍，返还底价 50%');
      }
      GameState.save();
    });
  },

  /* --- 上架选择器 --- */
  showListingPicker() {
    const available = GameState.collection.filter(c => {
      return !(GameState.auction.listings || []).some(l => l.itemId === c.id);
    });

    if (available.length === 0) {
      GameState.toast('没有可上架的藏品');
      return;
    }

    /* 简化：上架第一件 */
    const item = available[0];
    const price = 100 + RNG.int(0, 200);
    GameState.auction.listings.push({
      itemId: item.id,
      price: price,
      listedAt: Date.now(),
    });
    GameState.save();
    GameState.toast('已上架「' + item.name + '」底价 💰' + price);
  },

  /* --- 生成拍卖会拍品 --- */
  generateAuctionLots() {
    this.lots = [];
    const count = RNG.int(3, 5);

    for (let i = 0; i < count; i++) {
      const quality = RNG.weighted([
        { value: 'white',  weight: 30 },
        { value: 'green',  weight: 30 },
        { value: 'blue',   weight: 20 },
        { value: 'purple', weight: 15 },
        { value: 'orange', weight: 5 },
      ]);

      const artifact = typeof ItemDB !== 'undefined' ? ItemDB.randomArtifact(quality) : { name: '龙纹玉佩' };
      const basePrices = { white:100, green:200, blue:400, purple:800, orange:1500 };
      const startPrice = basePrices[quality] + RNG.int(-20, 50);

      this.lots.push({
        item: {
          id: 'lot_' + i,
          name: artifact.name,
          quality: quality,
        },
        startPrice: startPrice,
        currentBid: startPrice,
        bidderId: null,
        bidderName: null,
      });
    }
  },

  handleClick(pos) {
    return UI.hitTest(pos) ? 'auction' : null;
  }
};

  </script>

  <script>
/* === museum.js - 博物馆页面 === */

const MuseumPage = {

  /* 获取展位数量和增益加成 */
  getSlotCount() {
    if (typeof BuildingSystem !== 'undefined') return BuildingSystem.getEffect('museum').slots;
    return 6;
  },

  getBonus() {
    if (typeof BuildingSystem !== 'undefined') return BuildingSystem.getEffect('museum').bonus;
    return 0;
  },

  init() {
  },

  render() {
    UI.clearAreas();
    const W = Game.width, H = Game.height;
    const margin = 16;

    Renderer.rect(0, 0, W, H, '#F5F5F5');
    UI.statusBar();

    /* 增益提示 */
    const slotCount = this.getSlotCount();
    const filled = GameState.museumSlots.filter(s => s !== null).length;
    const bonus = this.getBonus();
    UI.pageTitle('博物馆', '展位增益 +' + bonus + '% (' + filled + '/' + slotCount + ')');

    const contentY = 108;

    /* 展位网格自适应 */
    const cols = 3;
    const rows = Math.ceil(slotCount / cols);
    const gap = 12;
    const slotW = (W - margin * 2 - gap * (cols - 1)) / cols;
    const slotH = slotW * 1.1;

    for (let i = 0; i < slotCount; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const sx = margin + col * (slotW + gap);
      const sy = contentY + row * (slotH + gap);

      const item = GameState.museumSlots[i];

      if (item && typeof item === 'object') {
        /* 已放置 */
        this.renderOccupiedSlot(sx, sy, slotW, slotH, i, item);
      } else {
        /* 空展位 */
        this.renderEmptySlot(sx, sy, slotW, slotH, i);
      }
    }

    /* 藏品仓库入口 */
    const invY = contentY + rows * (slotH + gap) + 16;
    Renderer.text('藏品仓库 (' + GameState.collection.length + ' 件)', margin + 4, invY, {
      color: '#3B5998',
      font: '13px -apple-system, "PingFang SC", sans-serif',
    });
    UI.addArea(margin, invY - 8, W - margin * 2, 28, () => {
      this.showCollectionPicker();
    });

    UI.bottomNav([
      { id: 'hall',      label: '大厅',   icon: '🏠' },
      { id: 'members',   label: '队员',   icon: '👥' },
      { id: 'inventory', label: '背包',   icon: '🎒' },
      { id: 'minigame',  label: '挖宝',   icon: '⛏️' },
    ], 'museum');
  },

  /* 空展位 */
  renderEmptySlot(x, y, w, h, idx) {
    Renderer.roundRect(x, y, w, h, 8, '#FFFFFF');
    Renderer.roundRect(x + 1, y + 1, w - 2, h - 2, 7, '#F9F9F9');
    /* 虚线边框效果用两条细线模拟 */
    Renderer.rect(x + 2, y + 2, w - 4, 0.5, '#E0E0E0');
    Renderer.rect(x + 2, y + h - 3, w - 4, 0.5, '#E0E0E0');

    Renderer.centerText('空', x + w / 2, y + h / 2, {
      color: '#CCCCCC',
      font: '14px -apple-system, "PingFang SC", sans-serif',
    });

    UI.addArea(x, y, w, h, () => {
      this.showCollectionPicker(idx);
    });
  },

  /* 已占展位 */
  renderOccupiedSlot(x, y, w, h, idx, item) {
    if (!item) return;

    const qColor = { white:'#999', green:'#52C41A', blue:'#1890FF', purple:'#722ED1', orange:'#FA8C16' }[item.quality] || '#999';

    Renderer.card(x, y, w, h, 8);

    /* 品质标签 */
    Renderer.qualityBadge(item.quality, x + 6, y + 6);

    /* 图标 */
    Renderer.centerText('🏺', x + w / 2, y + h / 2 - 10, {
      font: '32px -apple-system, "PingFang SC", sans-serif',
    });

    /* 名称 */
    Renderer.centerText(item.name, x + w / 2, y + h - 18, {
      color: qColor,
      font: 'bold 12px -apple-system, "PingFang SC", sans-serif',
      maxWidth: w - 16,
    });

    /* 点击交互 */
    UI.addArea(x, y, w, h, () => {
      UI.confirmDialog('移除展品', '将「' + item.name + '」从展位移除？', () => {
        MuseumSystem.removeItem(idx);
        GameState.save();
      }, null);
    });
  },

  /* 藏品选择器 - 弹出选择列表 */
  showCollectionPicker(targetSlot = -1) {
    const slotCount = this.getSlotCount();
    /* 过滤已放置的藏品：museumSlots 现在存储完整对象 */
    const placedIds = GameState.museumSlots.filter(s => s && typeof s === 'object').map(s => s.id);
    const available = GameState.collection.filter(c => !placedIds.includes(c.id));

    if (available.length === 0) {
      GameState.toast('没有可展示的藏品');
      return;
    }

    let slot = -1;
    if (targetSlot >= 0 && targetSlot < slotCount && !GameState.museumSlots[targetSlot]) {
      slot = targetSlot;
    } else {
      for (let i = 0; i < slotCount; i++) {
        if (!GameState.museumSlots[i]) { slot = i; break; }
      }
    }
    if (slot >= 0 && MuseumSystem.placeItem(slot, available[0].id)) {
      GameState.toast('已展示「' + available[0].name + '」');
    }
  },

  handleClick(pos) {
    return UI.hitTest(pos) ? 'museum' : null;
  }
};

  </script>

        }
      });
    });
  },

  /* --- 生成招募池 (3 名候选) --- */
  generateRecruitPool() {
    this.recruitPool = [];
    for (let i = 0; i < 3; i++) {
      const quality = this.rollQuality();
      const q = this.qualityTable.find(q => q.key === quality);
      const prefix = RNG.pick(this.namePool.prefix, 1)[0];
      const suffix = RNG.pick(this.namePool.suffix, 1)[0];
      const name = prefix + suffix;
      const aptitude = RNG.pick(this.aptitudePool, 1)[0];
      const aptValue = RNG.int(20 + q.tier * 10, 40 + q.tier * 15);
      const specialty = RNG.pick(this.specialtyPool, 1)[0];

      this.recruitPool.push({
        name, quality, aptitude, aptValue, specialty,
        strength: RNG.int(20 + q.tier * 10, 40 + q.tier * 15),
        agility: RNG.int(20 + q.tier * 10, 40 + q.tier * 15),
        perception: RNG.int(20 + q.tier * 10, 40 + q.tier * 15),
        vitality: RNG.int(20 + q.tier * 10, 40 + q.tier * 15),
        spirit: RNG.int(20 + q.tier * 10, 40 + q.tier * 15),
      });
    }
  },

  /* 按权重掷品质 */
  rollQuality() {
    const total = this.qualityTable.reduce((s, q) => s + q.weight, 0);
    let roll = RNG.int(1, total);
    for (const q of this.qualityTable) {
      roll -= q.weight;
      if (roll <= 0) return q.key;
    }
    return 'white';
  },

  /* 点击处理 */
  handleClick(pos) {
    return UI.hitTest(pos) ? 'members' : null;
  }
};
