  <script>
/* === audio.js - 程序化音效系统 (Web Audio API) === */

const AudioFX = {
  _ctx: null,
  _muted: false,

  _getCtx() {
    if (!this._ctx) {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  },

  /* 切换静音 */
  toggle() {
    this._muted = !this._muted;
    return this._muted;
  },

  isMuted() { return this._muted; },

  /* 播放音调 */
  _playTone(freq, duration, type = 'sine', vol = 0.08) {
    if (this._muted) return;
    try {
      const ctx = this._getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch (e) { /* 静默失败 */ }
  },

  /* 点击按钮 */
  click() {
    this._playTone(800, 0.05, 'sine', 0.04);
  },

  /* 页面切换 */
  pageFlip() {
    if (this._muted) return;
    try {
      const ctx = this._getCtx();
      const now = ctx.currentTime;
      [600, 800].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.04, now + i * 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.06);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + i * 0.04);
        osc.stop(now + i * 0.04 + 0.06);
      });
    } catch (e) {}
  },

  /* 获得奖励 */
  reward() {
    if (this._muted) return;
    try {
      const ctx = this._getCtx();
      const now = ctx.currentTime;
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.06, now + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.12);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.12);
      });
    } catch (e) {}
  },

  /* 升级完成 */
  upgrade() {
    if (this._muted) return;
    try {
      const ctx = this._getCtx();
      const now = ctx.currentTime;
      [400, 500, 600, 800, 1000].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.05, now + i * 0.06);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.10);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + i * 0.06);
        osc.stop(now + i * 0.06 + 0.10);
      });
    } catch (e) {}
  },

  /* 错误/失败 */
  error() {
    this._playTone(200, 0.15, 'sawtooth', 0.05);
  },

  /* 倒计时滴答 */
  tick() {
    this._playTone(1000, 0.03, 'sine', 0.03);
  },

  /* 金币音效 */
  coin() {
    this._playTone(1200, 0.06, 'square', 0.03);
    setTimeout(() => this._playTone(1600, 0.06, 'square', 0.03), 40);
  },
};

  <script>
/* === main.js - 万界挖宝 入口 === */

const Game = {
  canvas: null,
  ctx: null,
  width: 0,
  height: 0,
  scale: 2,
  dpr: 1,
  fps: 60,
  running: false,
  rafId: null,
  lastTime: 0,
  dt: 0,

  /* --- Init --- */
  init() {
    /* 初始化游戏状态与系统 */
    GameState.init();
    if (typeof MemberSystem !== 'undefined') MemberSystem.init();
    if (typeof BuildingSystem !== 'undefined') BuildingSystem.init();
    if (typeof ExpeditionSystem !== 'undefined') ExpeditionSystem.init();
    if (typeof DigSystem !== 'undefined') DigSystem.init();
    if (typeof AuctionSystem !== 'undefined') AuctionSystem.init();
    if (typeof MuseumSystem !== 'undefined') MuseumSystem.init();
    if (typeof WorkshopSystem !== 'undefined') WorkshopSystem.init();

    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');

    this.dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.scale = this.dpr;

    this.resize();
    window.addEventListener('resize', () => this.resize());

    /* Touch / Click proxy */
    this.canvas.addEventListener('click', e => this.onClick(e));
    this.canvas.addEventListener('touchstart', e => this.onTouch(e), { passive: false });

    /* Prevent context menu on long press */
    this.canvas.addEventListener('contextmenu', e => e.preventDefault());

    this.running = true;
    this.lastTime = performance.now();
    this.loop(0);

    /* 隐藏加载画面 */
    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading) loading.classList.add('hide');
    }, 300);
  },

  /* --- Start Game (全屏按钮) --- */
  startGame() {
    const W = this.width;
    const btnW = 68;
    const btnH = 30;
    const btnX = W - btnW - 16;
    const btnY = 64;

    var supported = (document.documentElement.requestFullscreen
      || document.documentElement.webkitRequestFullscreen
      || document.documentElement.webkitRequestFullScreen) ? true : false;

    if (supported) {
      Renderer.btn('全屏', btnX, btnY, btnW, btnH, 'primary');
    } else {
      Renderer.btn('全屏(不支持)', btnX, btnY, btnW, btnH, 'secondary');
    }

    UI.addArea(btnX, btnY, btnW, btnH, function() {
      if (supported) window.requestGameFullscreen();
    });
  },

  /* --- Resize --- */
  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    this.width = rect.width;
    this.height = rect.height;

    this.canvas.width = this.width * this.scale;
    this.canvas.height = this.height * this.scale;
    this.canvas.style.width = this.width + 'px';
    this.canvas.style.height = this.height + 'px';

    this.ctx.setTransform(this.scale, 0, 0, this.scale, 0, 0);
  },

  /* --- Game Loop --- */
  loop(timestamp) {
    if (!this.running) return;
    this.rafId = requestAnimationFrame(t => this.loop(t));

    this.dt = Math.min((timestamp - this.lastTime) / 1000, 0.05);
    this.lastTime = timestamp;

    this.update();
    this.render();
  },

  /* --- Update --- */
  update() {
    /* 系统驱动：建筑/寻藏/挖宝/拍卖 */
    if (typeof BuildingSystem !== 'undefined') BuildingSystem.update();
    if (typeof ExpeditionSystem !== 'undefined') ExpeditionSystem.checkAll();
    if (typeof DigSystem !== 'undefined') DigSystem.checkAll();
    if (typeof AuctionSystem !== 'undefined') AuctionSystem.update();

    /* 小游戏驱动 */
    if (GameState.ui.currentPage === 'minigame' &&
        typeof MinigamePage !== 'undefined' &&
        MinigamePage.activeGameInstance &&
        typeof MinigamePage.activeGameInstance.update === 'function') {
      MinigamePage.activeGameInstance.update();
    }
  },

  /* --- Render --- */
  render() {
    const ctx = this.ctx;
    const W = this.width;
    const H = this.height;

    /* Clear */
    ctx.clearRect(0, 0, W, H);

    /* Route to current page renderer */
    const page = GameState.ui.currentPage;
    if (page === 'hall' && typeof HallPage !== 'undefined') {
      HallPage.render();
    } else if (page === 'members' && typeof MembersPage !== 'undefined') {
      MembersPage.render();
    } else if (page === 'expedition' && typeof ExpeditionPage !== 'undefined') {
      ExpeditionPage.render();
    } else if (page === 'dig' && typeof DigPage !== 'undefined') {
      DigPage.render();
    } else if (page === 'museum' && typeof MuseumPage !== 'undefined') {
      MuseumPage.render();
    } else if (page === 'auction' && typeof AuctionPage !== 'undefined') {
      AuctionPage.render();
    } else if (page === 'workshop' && typeof WorkshopPage !== 'undefined') {
      WorkshopPage.render();
    } else if (page === 'inventory' && typeof InventoryPage !== 'undefined') {
      InventoryPage.render();
    } else if (page === 'minigame' && typeof MinigamePage !== 'undefined') {
      MinigamePage.render();
    } else {
      /* Fallback */
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#999999';
      ctx.font = '14px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('万界挖宝', W / 2, H / 2);
    }
  },

  /* --- Input --- */
  onClick(e) {
    const pos = this.getCanvasPos(e);
    this.dispatch(pos);
  },

  onTouch(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (!touch) return;
    const pos = { x: touch.clientX, y: touch.clientY };
    /* Convert client to canvas */
    const rect = this.canvas.getBoundingClientRect();
    pos.x -= rect.left;
    pos.y -= rect.top;
    this.dispatch(pos);
  },

  getCanvasPos(e) {
    const rect = this.canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  },

  dispatch(pos) {
    /* Route to current page */
    const page = GameState.ui.currentPage;
    if (page === 'hall' && typeof HallPage !== 'undefined') {
      HallPage.handleClick(pos);
    } else if (page === 'members' && typeof MembersPage !== 'undefined') {
      MembersPage.handleClick(pos);
    } else if (page === 'expedition' && typeof ExpeditionPage !== 'undefined') {
      ExpeditionPage.handleClick(pos);
    } else if (page === 'dig' && typeof DigPage !== 'undefined') {
      DigPage.handleClick(pos);
    } else if (page === 'museum' && typeof MuseumPage !== 'undefined') {
      MuseumPage.handleClick(pos);
    } else if (page === 'auction' && typeof AuctionPage !== 'undefined') {
      AuctionPage.handleClick(pos);
    } else if (page === 'workshop' && typeof WorkshopPage !== 'undefined') {
      WorkshopPage.handleClick(pos);
    } else if (page === 'inventory' && typeof InventoryPage !== 'undefined') {
      InventoryPage.handleClick(pos);
    } else if (page === 'minigame' && typeof MinigamePage !== 'undefined') {
      MinigamePage.handleClick(pos);
    }
  }
};

/* --- Boot --- */
document.addEventListener('DOMContentLoaded', () => {
  try {
    Game.init();
    /* 启动成功标记 */
    var ok = document.createElement('div');
    ok.id = '_boot_ok';
    ok.style.cssText = 'position:fixed;bottom:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#52C41A;z-index:99999;opacity:0.6';
    document.body.appendChild(ok);
  } catch(e) {
    var dump = document.getElementById('err-dump');
    if (dump) {
      dump.style.display = 'block';
      dump.textContent = 'BOOT FAILED: ' + e.message + '\n' + (e.stack || '');
    }
  }
});

  </script>
